name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.git_info.outputs.sha }}
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get version info from Git
        id: git_info
        run: |
          echo "version=$(git describe --tags --abbrev=7 --always)" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.git_info.outputs.sha }}
            type=raw,value=latest,enable=${{ github.ref_type == 'branch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.git_info.outputs.version }}
            BUILD_ID=${{ steps.git_info.outputs.sha }}

  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Copy compose.yaml to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.yaml"
          target: "/home/plachtis/DOCKER/plachtis-test"
      
      - name: Deploy to test VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/plachtis/DOCKER/plachtis-test
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            IMAGE_REPO=ghcr.io/${{ github.repository }}
            docker pull ${IMAGE_REPO}:${IMAGE_TAG}

            # Persist image selection for compose variable substitution.
            touch .env
            if grep -q '^GITHUB_REPOSITORY=' .env; then
              sed -i "s|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${{ github.repository }}|" .env
            else
              echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            fi
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi
            if grep -q '^CONTAINER_NAME=' .env; then
              sed -i "s|^CONTAINER_NAME=.*|CONTAINER_NAME=plachtis-test-web|" .env
            else
              echo "CONTAINER_NAME=plachtis-test-web" >> .env
            fi
            if grep -q '^DJANGO_ALLOWED_HOSTS=' .env; then
              sed -i "s|^DJANGO_ALLOWED_HOSTS=.*|DJANGO_ALLOWED_HOSTS=plachtis-test.remesh.cz|" .env
            else
              echo "DJANGO_ALLOWED_HOSTS=plachtis-test.remesh.cz" >> .env
            fi

            docker compose down
            docker compose up -d
            docker system prune -f

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Copy compose.yaml to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "compose.yaml"
          target: "/home/plachtis/DOCKER/plachtis"
      
      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/plachtis/DOCKER/plachtis
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            IMAGE_REPO=ghcr.io/${{ github.repository }}
            docker pull ${IMAGE_REPO}:${IMAGE_TAG}

            # Persist image selection for compose variable substitution.
            touch .env
            if grep -q '^GITHUB_REPOSITORY=' .env; then
              sed -i "s|^GITHUB_REPOSITORY=.*|GITHUB_REPOSITORY=${{ github.repository }}|" .env
            else
              echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            fi
            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi
            if grep -q '^CONTAINER_NAME=' .env; then
              sed -i "s|^CONTAINER_NAME=.*|CONTAINER_NAME=plachtis-web|" .env
            else
              echo "CONTAINER_NAME=plachtis-web" >> .env
            fi
            if grep -q '^DJANGO_ALLOWED_HOSTS=' .env; then
              sed -i "s|^DJANGO_ALLOWED_HOSTS=.*|DJANGO_ALLOWED_HOSTS=plachtis.remesh.cz,plachtis.skare.cz|" .env
            else
              echo "DJANGO_ALLOWED_HOSTS=plachtis.remesh.cz,plachtis.skare.cz" >> .env
            fi

            docker compose down
            docker compose up -d
            docker system prune -f
