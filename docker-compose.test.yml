services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY:-owner/repo}:latest
    container_name: plachtis-test-web
    restart: unless-stopped
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-plachtis-test.remesh.cz}
      - PYTHONUNBUFFERED=1
      - DB_DIR=/app/db_data
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    volumes:
      - ./data:/app/db_data
    command: >
      sh -c "mkdir -p /app/db_data &&
      python manage.py migrate &&
      exec gunicorn PlachtIS.wsgi:application
      --bind 0.0.0.0:8000
      --worker-class gthread
      --workers $${GUNICORN_WORKERS}
      --threads $${GUNICORN_THREADS}
      --timeout $${GUNICORN_TIMEOUT}
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile -
      --error-logfile -"
    networks:
      - proxy

# Use an external network named 'proxy' for reverse proxying
networks:
  proxy:
    external: true
