{% extends 'SkaRe/base.html' %}

{% block title %}Smazat loď {{ boat.name }} - SkaRe{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1 class="mb-4"><i class="bi bi-trash"></i> Smazat loď</h1>

        <div class="card border-danger mb-4">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Potvrzení smazání</h5>
            </div>
            <div class="card-body">
                <p class="card-text">
                    Opravdu chcete smazat loď <strong>{{ boat.name }}</strong>? Tato akce je nevratná.
                </p>
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{% url 'SkaRe:boat_detail' boat_id=boat.pk %}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Zrušit
            </a>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash"></i> Smazat
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
